name: TLPT Data Pipeline

permissions:
  contents: write

on:
  push:
    paths:
      - "data/raw/events/**"
      - "scripts/**"
      - "data/parsed/**"
  workflow_dispatch:

concurrency:
  group: tlpt-data-pipeline-main
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------
      # 🧾 Checkout repo
      # -----------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------------------
      # 🐍 Setup Python
      # -----------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -----------------------------------------
      # 🔄 Parse ALL events
      # -----------------------------------------
      - name: Parse all event reports
        run: python scripts/parse-event-reports.py

      # -----------------------------------------
      # 🔥 Generate index
      # -----------------------------------------
      - name: Generate event index
        run: node scripts/generate-event-index.js

      # -----------------------------------------
      # 🧠 Build site data
      # -----------------------------------------
      - name: Build site data
        run: python scripts/build-site-data.py

      # -----------------------------------------
      # 💾 Commit + push
      # -----------------------------------------
      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add data/parsed/events/
          git add data/generated/site-data.json

          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi

          git commit -m "🔄 TLPT auto-update (full rebuild)"

          for i in 1 2 3; do
            echo "Push attempt $i..."

            git pull --rebase origin main

            if git push origin main; then
              echo "Push succeeded."
              exit 0
            fi

            echo "Push failed. Retrying in 5 seconds..."
            sleep 5
          done

          echo "Failed to push after 3 attempts."
          exit 1
