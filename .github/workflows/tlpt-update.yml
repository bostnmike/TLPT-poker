name: TLPT Data Pipeline

permissions:
  contents: write

on:
  push:
    paths:
      - "data/raw/events/**"
      - "scripts/**"
      - "data/parsed/**"
  workflow_dispatch:

concurrency:
  group: tlpt-data-pipeline-main
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------
      # 🧾 Checkout repo
      # -----------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------------------
      # 🐍 Setup Python
      # -----------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -----------------------------------------
      # 🔄 Parse ALL events
      # -----------------------------------------
      - name: Parse all event reports
        run: python scripts/parse-event-reports.py

      # -----------------------------------------
      # 🔥 Generate index
      # -----------------------------------------
      - name: Generate event index
        run: node scripts/generate-event-index.js

      # -----------------------------------------
      # 🧠 Build site data
      # -----------------------------------------
      - name: Build site data
        run: python scripts/build-site-data.py

      # -----------------------------------------
      # 💀 Build knockout data
      # -----------------------------------------
      - name: Build knockout data
        run: python scripts/build-knockouts.py

      # -----------------------------------------
      # 🧪 Validate generated site data
      # -----------------------------------------
      - name: Validate site data
        run: python scripts/validate-site-data.py

      # -----------------------------------------
      # 💾 Commit + push generated data
      # -----------------------------------------
      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          echo "🔄 Syncing with latest main before committing generated files..."
          git fetch origin main
          git reset --hard origin/main

          echo "📥 Re-running parser after sync..."
          python scripts/parse-event-reports.py

          echo "🔥 Re-generating parsed event index..."
          node scripts/generate-event-index.js

          echo "📊 Rebuilding site data..."
          python scripts/build-site-data.py

          echo "💀 Rebuilding knockout data..."
          python scripts/build-knockouts.py

          echo "🧪 Re-validating site data..."
          python scripts/validate-site-data.py

          echo "📦 Staging generated outputs..."
          git add data/parsed/events/
          git add data/generated/site-data.json
          git add data/generated/validation-report.json
          git add data/generated/knockouts-generated.json
          git add data/generated/knockouts.json
          git add knockouts.json
          git add knockout-events-full.json
          git add knockout-name-map-full.json

          if git diff --cached --quiet; then
            echo "✅ No generated data changes to commit."
            exit 0
          fi

          git commit -m "🔄 TLPT auto-update (full rebuild)"

          echo "🚀 Pushing generated data..."
          git push origin HEAD:main
