name: TLPT Data Pipeline

on:
  push:
    paths:
      - "data/raw/event-summary.html"
      - "scripts/**"
      - "data/parsed/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------
      # 🧾 Checkout repo
      # -----------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------
      # 🟢 Setup Node
      # -----------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      # -----------------------------------------
      # 📦 Install dependencies (if any)
      # -----------------------------------------
      - name: Install dependencies
        run: npm install || echo "No dependencies"

      # -----------------------------------------
      # 🔄 Parse uploaded event HTML → JSON
      # -----------------------------------------
      - name: Parse event summary
        run: node scripts/parse-events.js

      # -----------------------------------------
      # 🔥 AUTO-GENERATE EVENT INDEX (KEY STEP)
      # -----------------------------------------
      - name: Generate event index
        run: node scripts/generate-event-index.js

      # -----------------------------------------
      # 🧠 Build site-data.json
      # -----------------------------------------
      - name: Build site data
        run: node scripts/build-site-data.js

      # -----------------------------------------
      # 💾 Commit changes back to repo
      # -----------------------------------------
      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add data/parsed/events/index.json
          git add data/parsed/events/*.json
          git add data/generated/site-data.json

          git diff --cached --quiet || git commit -m "🔄 TLPT auto-update: new event processed"
          git push
