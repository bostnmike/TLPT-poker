name: TLPT Data Pipeline

on:
  push:
    paths:
      - "data/raw/events/**"
      - "scripts/**"
      - "data/parsed/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------
      # 🧾 Checkout repo (FULL)
      # -----------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------------------
      # 🐍 Setup Python (YOU USE PYTHON PARSER)
      # -----------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -----------------------------------------
      # 🔍 DEBUG — confirm files exist
      # -----------------------------------------
      - name: Debug raw events
        run: |
          echo "Raw event files:"
          ls -la data/raw/events/

      # -----------------------------------------
      # 🔄 PARSE ALL EVENTS (REAL SCRIPT)
      # -----------------------------------------
      - name: Parse all event reports
        run: python scripts/parse-event-reports.py

      # -----------------------------------------
      # 🔍 DEBUG — confirm parsed output
      # -----------------------------------------
      - name: Debug parsed events
        run: |
          echo "Parsed event files:"
          ls -la data/parsed/events/

      # -----------------------------------------
      # 🔥 GENERATE INDEX (YOUR JS FILE)
      # -----------------------------------------
      - name: Generate event index
        run: node scripts/generate-event-index.js

      # -----------------------------------------
      # 🧠 BUILD SITE DATA (PYTHON VERSION)
      # -----------------------------------------
      - name: Build site data
        run: python scripts/build-site-data.py

      # -----------------------------------------
      # 💾 COMMIT EVERYTHING
      # -----------------------------------------
      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add data/parsed/events/
          git add data/generated/site-data.json

          git status

          git diff --cached --quiet || git commit -m "🔄 TLPT auto-update (full rebuild)"
          git push
