name: TLPT Data Pipeline

on:
  push:
    paths:
      - "data/raw/event-summary.html"
      - "scripts/**"
      - "data/parsed/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------
      # 🧾 Checkout FULL repo (IMPORTANT)
      # -----------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 🔥 ensures full file history + all files

      # -----------------------------------------
      # 🟢 Setup Node
      # -----------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      # -----------------------------------------
      # 📦 Install dependencies
      # -----------------------------------------
      - name: Install dependencies
        run: npm install || echo "No dependencies"

      # -----------------------------------------
      # 🔍 DEBUG: LIST FILES (CRITICAL)
      # -----------------------------------------
      - name: Debug - list event files
        run: |
          echo "Listing events directory:"
          ls -la data/parsed/events/

      # -----------------------------------------
      # 🔄 Parse new event (if present)
      # -----------------------------------------
      - name: Parse event summary
        run: node scripts/parse-events.js

      # -----------------------------------------
      # 🔥 Generate index (AFTER files exist)
      # -----------------------------------------
      - name: Generate event index
        run: node scripts/generate-event-index.js

      # -----------------------------------------
      # 🧠 Build site data
      # -----------------------------------------
      - name: Build site data
        run: node scripts/build-site-data.js

      # -----------------------------------------
      # 💾 Commit everything
      # -----------------------------------------
      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add data/parsed/events/
          git add data/generated/site-data.json

          git status

          git diff --cached --quiet || git commit -m "🔄 TLPT auto-update"
          git push
