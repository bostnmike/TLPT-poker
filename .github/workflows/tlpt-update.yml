name: TLPT Data Pipeline

permissions:
  contents: write

on:
  push:
    paths:
      - "data/raw/events/**"
      - "scripts/**"
      - "data/parsed/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------
      # 🧾 Checkout repo
      # -----------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------------------
      # 🐍 Setup Python
      # -----------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -----------------------------------------
      # 🔄 Parse ALL events
      # -----------------------------------------
      - name: Parse all event reports
        run: python scripts/parse-event-reports.py

      # -----------------------------------------
      # 🔥 Generate index
      # -----------------------------------------
      - name: Generate event index
        run: node scripts/generate-event-index.js

      # -----------------------------------------
      # 🧠 Build site data
      # -----------------------------------------
      - name: Build site data
        run: python scripts/build-site-data.py

      # -----------------------------------------
      # 💾 Commit + push
      # -----------------------------------------
      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add data/parsed/events/
          git add data/generated/site-data.json

          git diff --cached --quiet || git commit -m "🔄 TLPT auto-update (full rebuild)"
          git push
