name: Build Site Data

on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/**'
      - 'data/raw/**'
      - 'data/parsed/**'
      - 'data/player-metadata.json'
      - 'data/league-config.json'
      - 'data/events.json'
      - '.github/workflows/build-site-data.yml'

permissions:
  contents: write

jobs:
  build-site-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Show repo structure
        run: |
          pwd
          ls -la
          echo "---- data ----"
          ls -la data || true
          echo "---- scripts ----"
          ls -la scripts || true
          echo "---- raw events ----"
          ls -la data/raw/events || true
          echo "---- parsed events ----"
          ls -la data/parsed/events || true
          echo "---- generated ----"
          ls -la data/generated || true

      - name: Parse event reports
        run: python scripts/parse-event-reports.py

      - name: Build generated site data
        run: python scripts/build-site-data.py

      - name: Build knockouts data
        run: python scripts/build-knockouts.py

      - name: Validate generated site data
        run: python scripts/validate-site-data.py

      - name: Show generated outputs
        run: |
          echo "---- generated ----"
          ls -la data/generated || true
          echo "---- parsed events ----"
          ls -la data/parsed/events || true
          echo "---- validation report ----"
          cat data/generated/validation-report.json || true
          echo "---- knockouts ----"
          ls -la knockouts.json || true

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/parsed/events/*.json data/generated/site-data.json data/generated/validation-report.json knockouts.json || true

          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Automated site data rebuild"
            git fetch origin main
            git pull --rebase origin main
            git push origin HEAD:main
          fi
