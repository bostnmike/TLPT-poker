name: Build Gallery Manifest

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-gallery-manifest:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Verify gallery folders
        run: |
          pwd
          ls -la
          ls -la images || true
          ls -la images/twtw || true

      - name: Generate gallery manifest
        run: node scripts/build-gallery-manifest.mjs

      - name: Commit manifest if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add images/twtw/gallery-manifest.json
          git diff --cached --quiet || git commit -m "Update gallery manifest"
          git push
