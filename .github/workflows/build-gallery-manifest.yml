name: Build Gallery Manifest

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'images/twtw/gallery-manifest.json'
  workflow_dispatch:

concurrency:
  group: build-gallery-manifest-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-gallery-manifest:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Verify gallery folders
        run: |
          pwd
          ls -la
          ls -la images || true
          ls -la images/twtw || true

      - name: Generate gallery manifest
        run: node scripts/build-gallery-manifest.mjs

      - name: Commit manifest if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add images/twtw/gallery-manifest.json

          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi

          git commit -m "Update gallery manifest"

          for attempt in 1 2 3; do
            echo "Push attempt $attempt..."

            git fetch origin main
            git rebase origin/main

            if git push --force-with-lease origin HEAD:main; then
              echo "Push succeeded."
              exit 0
            fi

            echo "Push failed on attempt $attempt. Retrying..."
            sleep 3
          done

          echo "Push failed after 3 attempts."
          exit 1
