<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TLPT Standings</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <div>
        <h1 class="logo">TLPT Poker League</h1>
        <p class="tag">The League. The Players. The Tilt.</p>
      </div>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="standings.html">The Standings</a>
        <a href="dashboard.html">The Dashboard</a>
        <a href="players.html">The Crew</a>
        <a href="schedule.html">The Schedule</a>
        <a href="champions.html">The (Dis)Honors</a>
        <a href="rules.html">The Rules</a>
        <a href="media.html">The Film</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <section class="section">
      <div class="section-head page-title-row">
        <img class="page-chip page-chip-dashboard" src="images/site/chip-T-5000.png" alt="T-5000 chip" onerror="this.style.display='none';" />
        <h2 class="page-title-blue">Sortable League Standings</h2>
      </div>

      <div class="button-row" data-sort-scope="standings">
        <button class="btn active" data-standings-sort="profit" type="button">Profit</button>
        <button class="btn" data-standings-sort="roi" type="button">ROI</button>
        <button class="btn" data-standings-sort="trueSkillScore" type="button">Power</button>
        <button class="btn" data-standings-sort="hits" type="button">Hits</button>
        <button class="btn" data-standings-sort="timesPlaced" type="button">Cashes</button>
        <button class="btn" data-standings-sort="bubbles" type="button">Bubbles</button>
        <button class="btn" data-standings-sort="luckIndex" type="button">Luck</button>
        <button class="btn" data-standings-sort="clutchIndex" type="button">Clutch</button>
      </div>

      <div class="table-wrap">
        <table id="standings-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Player</th>
              <th>Profit</th>
              <th>ROI</th>
              <th>Power</th>
              <th>Hits</th>
              <th>Cashes</th>
              <th>Bubbles</th>
              <th>Luck</th>
              <th>Clutch</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>TLPT Poker League</p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
