<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Standings | TLPT Poker League</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <div>
        <h1 class="logo">TLPT Poker League</h1>
        <p class="tag">Standings</p>
      </div>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="standings.html">Standings</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="players.html">Players</a>
        <a href="schedule.html">Schedule</a>
        <a href="champions.html">Honors</a>
        <a href="rules.html">Rules</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <section class="section section-with-chips">
      <img class="section-chip section-chip-a" src="images/site/chip-25.jpg" alt="" />
      <img class="section-chip section-chip-b" src="images/site/chip-500.jpg" alt="" />
      <img class="section-chip section-chip-c" src="images/site/chip-5K.jpg" alt="" />

      <div class="section-head">
        <h2>League Standings</h2>
        <div class="button-row">
          <button class="btn small" onclick="renderStandings('profit')">Profit</button>
          <button class="btn small" onclick="renderStandings('trueSkillScore')">Power</button>
          <button class="btn small" onclick="renderStandings('roi')">ROI</button>
          <button class="btn small" onclick="renderStandings('hits')">Hits</button>
          <button class="btn small" onclick="renderStandings('timesPlaced')">Cashes</button>
          <button class="btn small" onclick="renderStandings('bubbles')">Bubbles</button>
          <button class="btn small" onclick="renderStandings('luckIndex')">Luck</button>
          <button class="btn small" onclick="renderStandings('clutchIndex')">Clutch</button>
        </div>
      </div>

      <div class="table-wrap">
        <table id="standings-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Player</th>
              <th>Entries</th>
              <th>Hits</th>
              <th>Cashes</th>
              <th>Bubbles</th>
              <th>Profit</th>
              <th>ROI</th>
              <th>Power</th>
              <th>Luck</th>
              <th>Clutch</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <p class="muted" style="margin-top:16px;">* less than 5 entries</p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap">TLPT Poker League</div>
  </footer>

  <script src="app.js"></script>
  <script>
    loadSiteData().then(data => {
      window.siteData = data;
      renderStandings('profit');
    });
  </script>
</body>
</html>
