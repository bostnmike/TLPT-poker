<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Player Profile | TLPT Poker League</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .player-profile-shell {
      display: grid;
      gap: 24px;
    }

    .player-hero {
      display: grid;
      grid-template-columns: minmax(220px, 280px) 1fr;
      gap: 28px;
      align-items: start;
    }

    .player-hero-image {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .player-hero-image .avatar-frame {
      width: 240px;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid rgba(212, 175, 55, 0.8);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      background: rgba(0, 0, 0, 0.25);
    }

    .player-hero-image img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center;
      border-radius: 50%;
    }

    .player-hero-copy h2 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.05;
      color: #f5f5f5;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .player-quote {
      margin: 0 0 20px;
      font-size: 1.15rem;
      line-height: 1.5;
      font-style: italic;
      color: #d4af37;
    }

    .player-stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(145px, 1fr));
      gap: 12px;
    }

    .player-stat-card {
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      padding: 14px;
      background: rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(2px);
    }

    .player-stat-label {
      display: block;
      font-size: 0.8rem;
      opacity: 0.75;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .player-stat-value {
      font-size: 1.2rem;
      font-weight: 700;
      color: #f5f5f5;
    }

    .profit-positive {
      color: #39d353;
    }

    .profit-negative {
      color: #ff5c5c;
    }

    .profit-even {
      color: #f5f5f5;
    }

    .player-meta-list {
      display: grid;
      gap: 8px;
      margin-top: 18px;
    }

    .player-nav-links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .player-nav-links a {
      text-decoration: none;
    }

    .player-empty {
      padding: 24px;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.18);
    }

    @media (max-width: 860px) {
      .player-hero {
        grid-template-columns: 1fr;
      }

      .player-hero-image .avatar-frame {
        width: min(240px, 70vw);
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <div>
        <h1 class="logo">TLPT Poker League</h1>
        <p class="tag">Player Profile</p>
      </div>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="standings.html">Standings</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="players.html">The Crew</a>
        <a href="schedule.html">Schedule</a>
        <a href="champions.html">Honors</a>
        <a href="rules.html">Rules</a>
        <a href="media.html">Media</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <section class="section">
      <div id="player-profile"></div>
      <div id="player-nav" class="button-row" style="margin-top:20px;"></div>
      <p class="muted" style="margin-top:10px;">* less than 5 entries</p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap">TLPT Poker League</div>
  </footer>

  <script src="app.js"></script>
  <script>
    const DEFAULT_QUOTE = "They just haven't said anything funny... yet!";

    function getDisplayName(player) {
      return Number(player.entries || 0) < 5 ? `${player.name}*` : player.name;
    }

    function formatMoney(value) {
      const num = Number(value || 0);
      const sign = num < 0 ? "-" : "";
      return `${sign}$${Math.abs(num).toLocaleString()}`;
    }

    function formatPercent(value, digits = 1) {
      return `${(Number(value || 0) * 100).toFixed(digits)}%`;
    }

    function formatDecimal(value, digits = 1) {
      return Number(value || 0).toFixed(digits);
    }

    function normalizeValue(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/\*/g, "")
        .replace(/[^a-z0-9]+/g, "");
    }

    function getRequestedPlayer(players) {
      const params = new URLSearchParams(window.location.search);
      const rawPlayer =
        params.get("player") ||
        params.get("slug") ||
        params.get("name") ||
        window.location.hash.replace(/^#/, "");

      if (!rawPlayer) return null;

      const normalized = normalizeValue(decodeURIComponent(rawPlayer));

      return (
        players.find(p => normalizeValue(p.slug) === normalized) ||
        players.find(p => normalizeValue(p.name) === normalized) ||
        players.find(p => normalizeValue(getDisplayName(p)) === normalized) ||
        null
      );
    }

    function getProfitClass(value) {
      const num = Number(value || 0);
      if (num > 0) return "profit-positive";
      if (num < 0) return "profit-negative";
      return "profit-even";
    }

    function statCard(label, value, extraClass = "") {
      return `
        <div class="player-stat-card">
          <span class="player-stat-label">${label}</span>
          <span class="player-stat-value ${extraClass}">${value}</span>
        </div>
      `;
    }

    function renderPlayerProfile(data) {
      const container = document.getElementById("player-profile");
      const nav = document.getElementById("player-nav");
      const players = Array.isArray(data.players) ? data.players : [];
      const sortedPlayers = [...players].sort((a, b) => a.name.localeCompare(b.name));
      const requestedPlayer = getRequestedPlayer(sortedPlayers);
      const player = requestedPlayer || sortedPlayers[0];

      if (!player) {
        container.innerHTML = '<div class="player-empty">No player data found.</div>';
        nav.innerHTML = '<div class="player-nav-links"><a class="btn" href="players.html">Back to The Crew</a></div>';
        return;
      }

      const currentIndex = sortedPlayers.findIndex(p => p.slug === player.slug);
      const prevPlayer = sortedPlayers[(currentIndex - 1 + sortedPlayers.length) % sortedPlayers.length];
      const nextPlayer = sortedPlayers[(currentIndex + 1) % sortedPlayers.length];
      const quote = player.notes || player.quote || DEFAULT_QUOTE;

      container.innerHTML = `
        <div class="player-profile-shell">
          <div class="player-hero">
            <div class="player-hero-image">
              <div class="avatar-frame">
                <img src="${player.image}" alt="${getDisplayName(player)}" onerror="this.src='images/players/default.png'; this.onerror=null;" />
              </div>
            </div>
            <div class="player-hero-copy">
              <h2>${getDisplayName(player)}</h2>
              <p class="player-quote">“${quote}”</p>

              <div class="player-stat-grid">
                ${statCard("Profit", formatMoney(player.profit), getProfitClass(player.profit))}
                ${statCard("ROI", formatPercent(player.roi))}
                ${statCard("Cash Rate", formatPercent(player.cashRate))}
                ${statCard("Bubble Rate", formatPercent(player.bubbleRate))}
                ${statCard("Hit Rate", formatPercent(player.hitRate))}
                ${statCard("Entries", player.entries)}
                ${statCard("Buy-ins", player.buyIns)}
                ${statCard("Rebuys", player.rebuys)}
                ${statCard("Hits", player.hits)}
                ${statCard("Times Placed", player.timesPlaced)}
                ${statCard("Bubbles", player.bubbles)}
                ${statCard("True Skill", formatDecimal(player.trueSkillScore))}
                ${statCard("Luck Index", formatDecimal(player.luckIndex))}
                ${statCard("Clutch Index", formatDecimal(player.clutchIndex))}
                ${statCard("Aggression Index", formatDecimal(player.aggressionIndex))}
                ${statCard("Survivor Index", formatDecimal(player.survivorIndex))}
                ${statCard("Tilt Index", formatDecimal(player.tiltIndex))}
              </div>

              <div class="player-meta-list muted">
                <div>Expected Profit: ${formatMoney(player.expectedProfit)}</div>
              </div>
            </div>
          </div>
        </div>
      `;

      nav.innerHTML = `
        <div class="player-nav-links">
          <a class="btn" href="player.html?player=${encodeURIComponent(prevPlayer.slug)}">← ${getDisplayName(prevPlayer)}</a>
          <a class="btn" href="players.html">Back to The Crew</a>
          <a class="btn" href="player.html?player=${encodeURIComponent(nextPlayer.slug)}">${getDisplayName(nextPlayer)} →</a>
        </div>
      `;
    }

    (function initPlayerPage() {
      if (typeof loadSiteData === "function") {
        loadSiteData()
          .then(data => {
            window.siteData = data;
            renderPlayerProfile(data);
          })
          .catch(() => {
            document.getElementById("player-profile").innerHTML =
              '<div class="player-empty">Unable to load player data.</div>';
          });
      } else {
        fetch("site-data.json")
          .then(response => response.json())
          .then(data => renderPlayerProfile(data))
          .catch(() => {
            document.getElementById("player-profile").innerHTML =
              '<div class="player-empty">Unable to load player data.</div>';
          });
      }
    })();
  </script>
</body>
</html>
