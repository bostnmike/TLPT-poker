<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TLPT Media</title>

<link rel="stylesheet" href="style.css">

<style>
.media-frame{
  aspect-ratio:16 / 9;
  overflow:hidden;
}

.media-thumb-link{
  position:relative;
  display:block;
  width:100%;
  height:100%;
  border-radius:12px;
  overflow:hidden;
}

.media-thumb{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  transition:transform .25s ease;
}

.media-play-overlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:46px;
  color:#fff;
  background:rgba(0,0,0,.6);
  width:70px;
  height:70px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
  transition:all .25s ease;
}

.media-thumb-link:hover .media-thumb{
  transform:scale(1.05);
}

.media-thumb-link:hover .media-play-overlay{
  background:var(--gold);
  color:#000;
}
</style>

</head>

<body>

<header class="site-header">
<div class="wrap header-inner">

<div>
<h1 class="logo">TLPT Poker League</h1>
<p class="tag">The League. The Players. The Tilt.</p>
</div>

<nav class="nav">
<a href="index.html">Home</a>
<a href="standings.html">Standings</a>
<a href="dashboard.html">Dashboard</a>
<a href="players.html">Players</a>
<a href="schedule.html">Schedule</a>
<a href="champions.html">Honors</a>
<a href="rules.html">Rules</a>
<a href="media.html">Media</a>

</div>

alt="T-500 chip"

</div>
