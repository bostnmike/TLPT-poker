<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Player Form | TLPT</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="player-movement.css" />
</head>

<body>

<main class="wrap">
  <div class="pm-page">

    <!-- HEADER -->
    <section class="pm-header-shell">
      <div class="pm-title-row">
        <img src="images/site/chip-T-1000.png" class="pm-title-chip" />
        <h1>Player Form</h1>
      </div>
      <div class="pm-accent-line"></div>
    </section>

    <!-- CONTROLS -->
    <section class="pm-controls-shell">

      <div class="pm-controls-left">
        <button class="pm-btn hot active" data-sort="momentum">🔥 Hot</button>
        <button class="pm-btn cold" data-sort="cold">❄️ Cold</button>
        <button class="pm-btn consistent" data-sort="consistent">🟢 Consistent</button>
        <button class="pm-btn volatile" data-sort="volatile">🎢 Volatile</button>
      </div>

      <div class="pm-legend">
        <span>🏆 Win</span>
        <span>💀 Bust</span>
        <span>🔥 Streak</span>
        <span>💣 Bubble</span>
        <span>🎯 Deep Run</span>
        <span>↑ Rising</span>
        <span>↓ Falling</span>
      </div>
      
      <div class="pm-formula">
        <strong>Form Score:</strong> Deep Runs + Aggression + Survival − Rebuys − Cost
        <span class="pm-formula-sub">
          Last 5 events • Momentum & volatility driven
        </span>
      </div>

    </section>

    <!-- TOP -->
    <section class="pm-section-shell">
      <h2 id="pm-top-title">🔥 5 Hottest Players</h2>
      <div id="pm-top-movers" class="pm-movers-grid"></div>
    </section>

    <!-- ALL -->
    <section class="pm-section-shell">
      <h2>📊 All Players</h2>
      <div id="pm-player-grid" class="pm-player-grid"></div>
    </section>

  </div>
</main>

<script src="player-movement.js"></script>

</body>
</html>
