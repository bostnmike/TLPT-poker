<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | TLPT Poker League</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <div>
        <h1 class="logo">TLPT Poker League</h1>
        <p class="tag">Stats Dashboard</p>
      </div>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="standings.html">Standings</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="players.html">Players</a>
        <a href="schedule.html">Schedule</a>
        <a href="champions.html">Honors</a>
        <a href="rules.html">Rules</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <section class="section">
      <div class="section-head">
        <div>
          <h2>Dashboard</h2>
          <p class="muted">Sort the league by any tracked stat.</p>
        </div>
      </div>

      <div class="button-row dashboard-buttons">
        <button class="btn small" onclick="renderDashboardSortable('trueSkillScore')">Power</button>
        <button class="btn small" onclick="renderDashboardSortable('profit')">Profit</button>
        <button class="btn small" onclick="renderDashboardSortable('roi')">ROI</button>
        <button class="btn small" onclick="renderDashboardSortable('hits')">Hits</button>
        <button class="btn small" onclick="renderDashboardSortable('timesPlaced')">Cashes</button>
        <button class="btn small" onclick="renderDashboardSortable('bubbles')">Bubbles</button>
        <button class="btn small" onclick="renderDashboardSortable('cashRate')">Cash Rate</button>
        <button class="btn small" onclick="renderDashboardSortable('bubbleRate')">Bubble Rate</button>
        <button class="btn small" onclick="renderDashboardSortable('hitRate')">Hit Rate</button>
        <button class="btn small" onclick="renderDashboardSortable('luckIndex')">Luck</button>
        <button class="btn small" onclick="renderDashboardSortable('clutchIndex')">Clutch</button>
        <button class="btn small" onclick="renderDashboardSortable('aggressionIndex')">Aggression</button>
        <button class="btn small" onclick="renderDashboardSortable('survivorIndex')">Survivor</button>
        <button class="btn small" onclick="renderDashboardSortable('tiltIndex')">Tilt</button>
      </div>

      <div id="dashboard-grid" class="five-col-grid"></div>
      <p class="muted" style="margin-top:16px;">* less than 5 entries</p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap">TLPT Poker League</div>
  </footer>

  <script src="app.js"></script>
  <script>
    loadSiteData().then(data => {
      window.siteData = data;
      renderDashboardSortable('trueSkillScore');
    });
  </script>
</body>
</html>
