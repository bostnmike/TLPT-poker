<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TLPT Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>TLPT Dashboard</h1>

  <div id="player-grid"></div>

  <script>
    fetch('site-data.json')
      .then(res => res.json())
      .then(data => {
        const players = data.players || [];
        const grid = document.getElementById('player-grid');

        grid.innerHTML = players.map(player => {

          const tierClass = player.tier
            ? `tier-${player.tier.toLowerCase().replace(/\s+/g, '-')}`
            : '';

          const tierBadge = player.tier
            ? `<div class="player-tier-badge ${tierClass}">${player.tier}</div>`
            : '';

          const heat = player.heat
            ? `<div class="player-heat">🔥 ${player.heat}</div>`
            : '';

          return `
            <div class="player-card">
              <img src="images/players/${player.image}" class="player-avatar">
              <div class="player-name">${player.name}</div>
              ${tierBadge}
              ${heat}
            </div>
          `;
        }).join('');
      })
      .catch(err => {
        console.error('DATA LOAD ERROR:', err);
        document.body.innerHTML += '<p style="color:red;">Error loading dashboard</p>';
      });
  </script>

</body>
</html>
