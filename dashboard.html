<!-- dashboard.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TLPT Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <div>
        <h1 class="logo">TLPT Poker League</h1>
        <p class="tag">The League. The Players. The Tilt.</p>
      </div>

      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="standings.html">Standings</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="players.html">Players</a>
        <a href="schedule.html">Schedule</a>
        <a href="champions.html">Honors</a>
        <a href="rules.html">Rules</a>
        <a href="media.html">Media</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <section class="section">
      <div class="section-head page-title-row compact-page-title-row">
        <img class="page-chip page-chip-dashboard" src="images/site/chip-T-10000.png" alt="T-10000 chip" onerror="this.style.display='none';" />
        <h2>TLPT Dashboard</h2>
      </div>

      <div class="dashboard-sort-shell">
        <div class="dashboard-button-groups" data-sort-scope="dashboard">
          <div class="button-row dashboard-buttons">
            <button class="btn active" data-dashboard-sort="profit" type="button">Profit</button>
            <button class="btn" data-dashboard-sort="roi" type="button">ROI</button>
            <button class="btn" data-dashboard-sort="hits" type="button">Hits</button>
            <button class="btn" data-dashboard-sort="timesPlaced" type="button">Cashes</button>
            <button class="btn" data-dashboard-sort="bubbles" type="button">Bubbles</button>
          </div>

          <div class="button-row dashboard-buttons">
            <button class="btn" data-dashboard-sort="hitRate" type="button">Hit Rate</button>
            <button class="btn" data-dashboard-sort="cashRate" type="button">Cash Rate</button>
            <button class="btn" data-dashboard-sort="bubbleRate" type="button">Bubble Rate</button>
          </div>

          <div class="button-row dashboard-buttons">
            <button class="btn" data-dashboard-sort="trueSkillScore" type="button">Power</button>
            <button class="btn" data-dashboard-sort="luckIndex" type="button">Luck</button>
            <button class="btn" data-dashboard-sort="clutchIndex" type="button">Clutch</button>
            <button class="btn" data-dashboard-sort="aggressionIndex" type="button">Aggression</button>
            <button class="btn" data-dashboard-sort="survivorIndex" type="button">Survivor</button>
            <button class="btn" data-dashboard-sort="tiltIndex" type="button">Tilt</button>
          </div>
        </div>

        <div class="dashboard-formula-panel">
          <div id="dashboard-formula-display" class="dashboard-formula-display">Click a stat button to reveal the calculation formula.</div>
        </div>
      </div>

      <div id="dashboard-grid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>TLPT Poker League</p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
