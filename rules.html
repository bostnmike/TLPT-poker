<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule | TLPT Poker League</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <div>
        <h1 class="logo">TLPT Poker League</h1>
        <p class="tag">Schedule & RSVP</p>
      </div>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="standings.html">Standings</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="players.html">Players</a>
        <a href="schedule.html">Schedule</a>
        <a href="champions.html">Honors</a>
        <a href="rules.html">Rules</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <section class="section schedule-hero schedule-table-bg">
      <img class="schedule-chip schedule-chip-a" src="images/site/chip-100K.jpg" alt="" />
      <img class="schedule-chip schedule-chip-b" src="images/site/chip-25K.jpg" alt="" />
      <img class="schedule-chip schedule-chip-c" src="images/site/chip-500.jpg" alt="" />

      <div class="section-head">
        <div>
          <p class="eyebrow">The Caahhd Room</p>
          <h2>Upcoming Events</h2>
          <p class="muted">This week at the table. Bruins chips, full RSVP tracking, and projected table size.</p>
        </div>
      </div>
    </section>

    <section class="section">
      <div id="schedule-list" class="card-grid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap">TLPT Poker League</div>
  </footer>

  <script src="app.js"></script>
  <script>
    loadSiteData().then(data => {
      window.siteData = data;
      renderSchedule(data);
    });
  </script>
</body>
</html>
