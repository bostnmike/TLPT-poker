<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Players | TLPT Poker League</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <div>
        <h1 class="logo">TLPT Poker League</h1>
        <p class="tag">Player Roster</p>
      </div>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="standings.html">Standings</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="players.html">Players</a>
        <a href="schedule.html">Schedule</a>
        <a href="champions.html">Honors</a>
        <a href="rules.html">Rules</a>
        <a href="media.html">Media</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <section class="section section-with-chips">
      <img class="section-chip section-chip-a" src="images/site/chip-25.jpg" alt="" />
      <img class="section-chip section-chip-b" src="images/site/chip-500.jpg" alt="" />
      <img class="section-chip section-chip-c" src="images/site/chip-25K.jpg" alt="" />

      <div class="section-head">
        <h2>Players</h2>
        <p class="muted">Click any player for a full profile.</p>
      </div>

      <div id="players-grid" class="five-col-grid"></div>
      <p class="muted" style="margin-top:16px;">* less than 5 entries</p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap">TLPT Poker League</div>
  </footer>

  <script src="app.js"></script>
  <script>
    loadSiteData().then(data => {
      window.siteData = data;
      renderPlayers(data);
    });
  </script>
</body>
</html>
