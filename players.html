<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TLPT Players</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <div>
        <h1 class="logo">TLPT Poker League</h1>
        <p class="tag">The League. The Players. The Tilt.</p>
      </div>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="standings.html">The Standings</a>
        <a href="dashboard.html">The Dashboard</a>
        <a href="players.html" class="is-active" aria-current="page">The Crew</a>
        <a href="schedule.html">The Schedule</a>
        <a href="champions.html">The (Dis)Honors</a>
        <a href="rules.html">The Rules</a>
        <a href="media.html">The Film</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <div class="crew-header-shell">
      <div class="section-head page-title-row">
        <img class="page-chip page-chip-dashboard" src="images/site/chip-T-25000.png" alt="T-25000 chip" onerror="this.style.display='none';" />
        <h2 class="page-title-red">Meet the Crew</h2>
      </div>

      <div id="players-explainer" class="page-kicker" style="display:none;"></div>

      <div class="crew-view-toolbar" data-sort-scope="crew-view">
        <button id="crew-view-tier" class="btn active" type="button">🎖️ Tier View</button>

        <label class="crew-view-switch" for="crew-view-switch-input" aria-label="Toggle between Tier View and Archetype View">
          <input id="crew-view-switch-input" type="checkbox" />
          <span class="crew-view-switch-track">
            <span class="crew-view-switch-thumb"></span>
          </span>
        </label>

        <button id="crew-view-archetype" class="btn" type="button">🫟 Archetype View</button>

        <div id="players-help-copy" class="page-kicker" style="display:none;"></div>
      </div>

    <section class="section">
      <div id="players-visual"></div>
      <div id="players-grid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>TLPT Poker League</p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
