<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule | TLPT Poker League</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <div>
        <h1 class="logo">TLPT Poker League</h1>
        <p class="tag">Schedule & RSVP</p>
      </div>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="standings.html">Standings</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="players.html">The Crew</a>
        <a href="schedule.html">Schedule</a>
        <a href="champions.html">Honors</a>
        <a href="rules.html">Rules</a>
        <a href="media.html">Media</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <section class="section schedule-hero schedule-table-bg">
      <div class="schedule-head-row">
        <div class="schedule-head-copy">
          <p class="eyebrow">The Caahhd Room</p>
          <h2>Upcoming Events</h2>
          <p class="muted">This week at the table. Full RSVP tracking and projected table size.</p>
        </div>

        <aside class="schedule-hosts-callout">
          <img src="images/site/hosts.png" alt="TLPT hosts" class="hosts-image" />
          <p class="hosts-copy">All games hosted by this <em>"dynamic duo"</em>!</p>
        </aside>
      </div>
    </section>

    <section class="section">
      <div id="schedule-list" class="card-grid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap">TLPT Poker League</div>
  </footer>

  <script src="app.js"></script>
  <script>
    loadSiteData().then(data => {
      window.siteData = data;
      renderSchedule(data);
    });
  </script>
</body>
</html>
